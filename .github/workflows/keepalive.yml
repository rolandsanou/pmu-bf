name: keepalive

# Pings the site so Render's free instance doesn't spin down (slow "loading"
# page). The 10-min schedule is DISABLED because the GitHub account is currently
# locked for a billing issue (scheduled Actions can't run). Once GitHub billing
# is resolved, re-add the schedule below to keep the site warm automatically:
#
#   schedule:
#     - cron: "*/10 6-22 * * *"
on:
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping site (tolerant of cold starts)
        run: |
          curl -sS --retry 5 --retry-all-errors --max-time 120 -o /dev/null \
            -w "jouer -> %{http_code}\n" "https://pari-express.onrender.com/jouer" || true
