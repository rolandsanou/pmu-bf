name: keepalive

# Pings the site so Render's free instance doesn't spin down (which causes the
# slow "loading" page). Runs every 10 min during active hours (06:00–22:00 UTC).
on:
  schedule:
    - cron: "*/10 6-22 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping site (tolerant of cold starts)
        run: |
          curl -sS --retry 5 --retry-all-errors --max-time 120 -o /dev/null \
            -w "jouer -> %{http_code}\n" "https://pari-express.onrender.com/jouer" || true
