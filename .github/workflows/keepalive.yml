name: keepalive

# Pings the site so Render's free instance doesn't spin down (which causes the
# slow "loading" page). Runs every 10 min during active hours (06:00–22:00 UTC).
on:
  schedule:
    - cron: "*/10 6-22 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping site
        run: |
          for path in / /jouer; do
            code=$(curl -sS -o /dev/null -w "%{http_code}" "https://pari-express.onrender.com$path")
            echo "$path -> $code"
          done
